<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Fair Credit Risk Lab demo loop</title>
  <desc id="desc">Animated README demo showing credit model metrics, fairness gaps, and sample decisions.</desc>
  <style>
    .bg { fill: #f0f2f6; }
    .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
    .paper { fill: #f7f8fb; stroke: #d7dee8; stroke-width: 2; }
    .ink { fill: #20222b; font-family: Segoe UI, Arial, sans-serif; }
    .muted { fill: #626b78; font-family: Segoe UI, Arial, sans-serif; }
    .blue { fill: #2b63c7; }
    .green { fill: #0d7f5f; }
    .red { fill: #b33a3a; }
    .violet { fill: #7251b5; }
    .track { fill: #e7ebf2; }
    .bar1 { animation: grow1 4s ease-in-out infinite; transform-origin: left; }
    .bar2 { animation: grow2 4s ease-in-out infinite; transform-origin: left; }
    .bar3 { animation: grow3 4s ease-in-out infinite; transform-origin: left; }
    .pulse { animation: pulse 4s ease-in-out infinite; transform-origin: center; }
    @keyframes grow1 { 0%, 20% { transform: scaleX(.15); } 45%, 90% { transform: scaleX(.83); } 100% { transform: scaleX(.15); } }
    @keyframes grow2 { 0%, 25% { transform: scaleX(.12); } 50%, 90% { transform: scaleX(.38); } 100% { transform: scaleX(.12); } }
    @keyframes grow3 { 0%, 30% { transform: scaleX(.12); } 55%, 90% { transform: scaleX(.46); } 100% { transform: scaleX(.12); } }
    @keyframes pulse { 0%, 100% { opacity: .75; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } }
  </style>
  <rect class="bg" width="1100" height="620"/>
  <text class="ink" x="50" y="58" font-size="34" font-weight="700">Fair Credit Risk Lab</text>
  <text class="muted" x="50" y="90" font-size="18">Visible README proof: responsible ML metrics, fairness checks, and model-card output.</text>
  <rect class="panel" x="50" y="125" width="1000" height="140" rx="10"/>
  <text class="ink" x="80" y="168" font-size="22" font-weight="700">Model evaluation snapshot</text>
  <g class="pulse">
    <rect class="paper" x="80" y="190" width="210" height="52" rx="8"/>
    <text class="muted" x="100" y="222" font-size="16">Precision</text>
    <text class="ink" x="212" y="224" font-size="26" font-weight="700">0.83</text>
  </g>
  <rect class="paper" x="315" y="190" width="210" height="52" rx="8"/>
  <text class="muted" x="335" y="222" font-size="16">Recall</text>
  <text class="ink" x="455" y="224" font-size="26" font-weight="700">0.71</text>
  <rect class="paper" x="550" y="190" width="210" height="52" rx="8"/>
  <text class="muted" x="570" y="222" font-size="16">F1</text>
  <text class="ink" x="690" y="224" font-size="26" font-weight="700">0.77</text>
  <rect class="paper" x="785" y="190" width="210" height="52" rx="8"/>
  <text class="muted" x="805" y="222" font-size="16">MACE</text>
  <text class="ink" x="910" y="224" font-size="26" font-weight="700">0.18</text>
  <rect class="panel" x="50" y="290" width="510" height="270" rx="10"/>
  <text class="ink" x="80" y="333" font-size="22" font-weight="700">Fairness metrics</text>
  <text class="muted" x="80" y="380" font-size="17">Statistical parity diff</text>
  <rect class="track" x="285" y="366" width="220" height="18" rx="9"/>
  <rect class="red bar2" x="285" y="366" width="220" height="18" rx="9"/>
  <text class="ink" x="515" y="382" font-size="17" font-weight="700">-0.20</text>
  <text class="muted" x="80" y="430" font-size="17">Equal opportunity diff</text>
  <rect class="track" x="285" y="416" width="220" height="18" rx="9"/>
  <rect class="green bar2" x="285" y="416" width="220" height="18" rx="9"/>
  <text class="ink" x="515" y="432" font-size="17" font-weight="700">-0.11</text>
  <text class="muted" x="80" y="480" font-size="17">Equalized odds diff</text>
  <rect class="track" x="285" y="466" width="220" height="18" rx="9"/>
  <rect class="violet bar3" x="285" y="466" width="220" height="18" rx="9"/>
  <text class="ink" x="515" y="482" font-size="17" font-weight="700">0.23</text>
  <rect class="panel" x="590" y="290" width="460" height="270" rx="10"/>
  <text class="ink" x="620" y="333" font-size="22" font-weight="700">Sample decisions</text>
  <text class="muted" x="620" y="378" font-size="16">ID</text>
  <text class="muted" x="705" y="378" font-size="16">Group</text>
  <text class="muted" x="820" y="378" font-size="16">Score</text>
  <text class="muted" x="925" y="378" font-size="16">Decision</text>
  <line x1="620" y1="392" x2="1010" y2="392" stroke="#d7dee8" stroke-width="2"/>
  <text class="ink" x="620" y="430" font-size="17">1</text>
  <text class="ink" x="705" y="430" font-size="17">A</text>
  <text class="ink" x="820" y="430" font-size="17">0.92</text>
  <text class="green" x="925" y="430" font-size="17" font-weight="700">approve</text>
  <text class="ink" x="620" y="475" font-size="17">2</text>
  <text class="ink" x="705" y="475" font-size="17">B</text>
  <text class="ink" x="820" y="475" font-size="17">0.42</text>
  <text class="red" x="925" y="475" font-size="17" font-weight="700">decline</text>
  <text class="ink" x="620" y="520" font-size="17">6</text>
  <text class="ink" x="705" y="520" font-size="17">B</text>
  <text class="ink" x="820" y="520" font-size="17">0.80</text>
  <text class="green" x="925" y="520" font-size="17" font-weight="700">approve</text>
</svg>

